name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Set versionCode from run number
        run: |
          VERSION_CODE=$((61 + ${{ github.run_number }}))
          node -e "
            const fs = require('fs');
            const p = 'artifacts/tamil-ai-chat/app.json';
            const j = JSON.parse(fs.readFileSync(p,'utf8'));
            j.expo.android.versionCode = $VERSION_CODE;
            fs.writeFileSync(p, JSON.stringify(j, null, 2));
            console.log('versionCode set to', j.expo.android.versionCode);
          "

      - name: Fetch custom app icon from Cloudinary
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          ICON_URL=$(curl -sf -u "$CLOUDINARY_API_KEY:$CLOUDINARY_API_SECRET" \
            "https://api.cloudinary.com/v1_1/$CLOUDINARY_CLOUD_NAME/resources/image?prefix=my-girls/app-icon/&type=upload&max_results=1" \
            | node -e "
              const d=[];process.stdin.on('data',c=>d.push(c));
              process.stdin.on('end',()=>{try{const r=JSON.parse(d.join(''));if(r.resources&&r.resources.length>0)console.log(r.resources[0].secure_url);}catch(e){}});
            " 2>/dev/null || true)
          if [ -n "$ICON_URL" ]; then
            curl -sL "$ICON_URL" -o artifacts/tamil-ai-chat/assets/images/icon.png
            curl -sL "$ICON_URL" -o artifacts/tamil-ai-chat/assets/images/adaptive-icon.png
            echo "✅ Custom icon applied"
          else
            echo "Using default icon"
          fi

      - name: Expo Prebuild
        working-directory: artifacts/tamil-ai-chat
        env:
          EXPO_PUBLIC_API_URL: https://my-girls-1-5.onrender.com
          EXPO_NO_TELEMETRY: 1
          CI: 1
        run: |
          yes | npx expo prebuild --platform android --clean 2>&1 || true
          if [ ! -d android ]; then
            echo "❌ android/ not created"
            exit 1
          fi
          ls android/

      - name: Pre-bundle JavaScript into Android assets
        working-directory: artifacts/tamil-ai-chat
        env:
          EXPO_PUBLIC_API_URL: https://my-girls-1-5.onrender.com
          NODE_ENV: production
          EXPO_NO_TELEMETRY: 1
        run: |
          mkdir -p android/app/src/main/assets
          mkdir -p android/app/src/main/res
          echo "=== Bundling JavaScript (entry: expo-router/entry) ==="
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            2>&1 || \
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file node_modules/expo-router/src/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            2>&1
          if [ -f android/app/src/main/assets/index.android.bundle ]; then
            ls -lh android/app/src/main/assets/
            echo "✅ JS bundle created"
          else
            echo "❌ Bundle not created — trying expo export approach"
            npx expo export --platform android --output-dir /tmp/expo-export 2>&1 || true
            ls /tmp/expo-export/ 2>/dev/null || true
            # Copy bundle if found
            BUNDLE=$(find /tmp/expo-export -name "*.bundle" 2>/dev/null | head -1)
            if [ -n "$BUNDLE" ]; then
              cp "$BUNDLE" android/app/src/main/assets/index.android.bundle
              echo "✅ Bundle from expo export: $BUNDLE"
            else
              echo "❌ Could not create bundle"
              exit 1
            fi
          fi

      - name: Build APK with Gradle
        working-directory: artifacts/tamil-ai-chat/android
        run: |
          chmod +x gradlew
          # Tell Gradle NOT to run bundling again (we pre-bundled)
          ./gradlew assembleDebug \
            -PbundleInDebug=false \
            --no-daemon \
            2>&1 | tee /tmp/gradle.log
          echo "=== APK files found ==="
          find . -name "*.apk" | grep -v node_modules | while read f; do
            echo "$(stat -c%s "$f") bytes — $f"
          done | sort -rn

      - name: Locate, validate and copy APK
        run: |
          APK=$(find artifacts/tamil-ai-chat/android -name "*.apk" 2>/dev/null \
            | grep -v "node_modules\|\.git" \
            | while read f; do echo "$(stat -c%s "$f" 2>/dev/null||echo 0) $f"; done \
            | sort -rn | awk 'NR==1{print $2}')
          echo "APK found: $APK"
          SIZE=$(stat -c%s "$APK" 2>/dev/null || echo 0)
          echo "SIZE: $SIZE bytes"
          if [ -z "$APK" ] || [ "$SIZE" -lt 1000000 ]; then
            echo "❌ APK invalid (size: $SIZE bytes)"
            tail -80 /tmp/gradle.log
            exit 1
          fi
          echo "✅ APK ready: $(ls -lh "$APK")"
          APK_NAME="my-girls-v${{ github.run_number }}.apk"
          cp "$APK" "$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV

      - name: Publish APK via GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ github.run_number }}"
          gh release create "$TAG" "$APK_NAME" \
            --title "My Girls — Build ${{ github.run_number }}" \
            --notes "Standalone APK — works on mobile network. Build ${{ github.run_number }}." \
            --latest \
            --repo ${{ github.repository }}
          echo "✅ https://github.com/${{ github.repository }}/releases/download/$TAG/$APK_NAME"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/gradle.log
          retention-days: 7
