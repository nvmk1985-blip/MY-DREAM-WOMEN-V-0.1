name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install ImageMagick
        run: |
          sudo apt-get install -y imagemagick
          convert --version | head -2

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Set versionCode from run number
        run: |
          VERSION_CODE=$((61 + ${{ github.run_number }}))
          node -e "
            const fs = require('fs');
            const p = 'artifacts/tamil-ai-chat/app.json';
            const j = JSON.parse(fs.readFileSync(p,'utf8'));
            j.expo.android.versionCode = $VERSION_CODE;
            fs.writeFileSync(p, JSON.stringify(j, null, 2));
            console.log('versionCode:', j.expo.android.versionCode);
          "

      - name: Verify app icon
        run: |
          ICON="artifacts/tamil-ai-chat/assets/images/icon.png"
          SIZE=$(stat -c%s "$ICON")
          SHA=$(sha256sum "$ICON" | awk '{print $1}')
          echo "✅ icon.png: $SIZE bytes | sha256=$SHA"

      - name: Expo Prebuild
        working-directory: artifacts/tamil-ai-chat
        env:
          EXPO_PUBLIC_API_URL: https://my-girls-1-5.onrender.com
          EXPO_NO_TELEMETRY: 1
          CI: 1
        run: |
          yes | npx expo prebuild --platform android --clean 2>&1 || true
          if [ ! -d android ]; then echo "❌ android/ not created"; exit 1; fi
          echo "✅ android/ created"

      - name: Inject custom icons via ImageMagick
        run: |
          ICON="artifacts/tamil-ai-chat/assets/images/icon.png"
          RES="artifacts/tamil-ai-chat/android/app/src/main/res"

          echo "📐 Generating launcher icons from $ICON ..."

          # Standard sizes: folder → launcher size → adaptive foreground size
          declare -A SIZES=(
            ["mipmap-mdpi"]="48x48 108x108"
            ["mipmap-hdpi"]="72x72 162x162"
            ["mipmap-xhdpi"]="96x96 216x216"
            ["mipmap-xxhdpi"]="144x144 324x324"
            ["mipmap-xxxhdpi"]="192x192 432x432"
          )

          for FOLDER in "${!SIZES[@]}"; do
            read LAUNCHER_SIZE FOREGROUND_SIZE <<< "${SIZES[$FOLDER]}"
            DIR="$RES/$FOLDER"
            mkdir -p "$DIR"

            # ic_launcher.png — full square icon
            convert "$ICON" -resize "$LAUNCHER_SIZE!" "$DIR/ic_launcher.png"
            echo "  ✅ $FOLDER/ic_launcher.png ($LAUNCHER_SIZE)"

            # ic_launcher_round.png — circular icon
            convert "$ICON" -resize "$LAUNCHER_SIZE" \
              \( +clone -alpha extract \
                 -draw "fill white circle $((${LAUNCHER_SIZE%x*}/2)),$((${LAUNCHER_SIZE#*x}/2)) $((${LAUNCHER_SIZE%x*}/2)),0" \
                 -alpha off \) \
              -compose CopyOpacity -composite \
              "$DIR/ic_launcher_round.png" 2>/dev/null || \
            convert "$ICON" -resize "$LAUNCHER_SIZE!" "$DIR/ic_launcher_round.png"
            echo "  ✅ $FOLDER/ic_launcher_round.png ($LAUNCHER_SIZE)"

            # ic_launcher_foreground.png — adaptive icon foreground (larger canvas with padding)
            convert "$ICON" -resize "${FOREGROUND_SIZE}!" "$DIR/ic_launcher_foreground.png"
            echo "  ✅ $FOLDER/ic_launcher_foreground.png ($FOREGROUND_SIZE)"
          done

          echo ""
          echo "📋 Verifying generated icons:"
          find "$RES" -name "ic_launcher*.png" | sort | while read f; do
            SIZE=$(identify -format "%wx%h" "$f" 2>/dev/null || echo "?x?")
            echo "  $SIZE — $f"
          done

      - name: Bundle JS with expo export:embed
        working-directory: artifacts/tamil-ai-chat
        env:
          EXPO_PUBLIC_API_URL: https://my-girls-1-5.onrender.com
          EXPO_NO_TELEMETRY: 1
          NODE_ENV: production
        run: |
          mkdir -p android/app/src/main/assets
          mkdir -p android/app/src/main/res
          npx expo export:embed \
            --platform android \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --dev false 2>&1
          BUNDLE=android/app/src/main/assets/index.android.bundle
          if [ -f "$BUNDLE" ]; then echo "✅ Bundle: $(stat -c%s $BUNDLE) bytes"
          else echo "❌ Bundle not created"; exit 1; fi

      - name: Build APK
        working-directory: artifacts/tamil-ai-chat/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug -PbundleInDebug=true --no-daemon 2>&1 | tee /tmp/gradle.log
          find . -name "*.apk" | grep -v node_modules | while read f; do
            echo "$(stat -c%s "$f") bytes — $f"
          done | sort -rn

      - name: Locate, validate and copy APK
        run: |
          APK=$(find artifacts/tamil-ai-chat/android -name "*.apk" 2>/dev/null \
            | grep -v node_modules \
            | while read f; do echo "$(stat -c%s "$f" 2>/dev/null||echo 0) $f"; done \
            | sort -rn | awk 'NR==1{print $2}')
          SIZE=$(stat -c%s "$APK" 2>/dev/null || echo 0)
          if [ -z "$APK" ] || [ "$SIZE" -lt 1000000 ]; then
            echo "❌ APK invalid ($SIZE bytes)"; tail -80 /tmp/gradle.log; exit 1
          fi
          echo "✅ $(ls -lh "$APK")"
          APK_NAME="my-girls-v${{ github.run_number }}.apk"
          cp "$APK" "$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV

      - name: Publish APK via GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ github.run_number }}"
          gh release create "$TAG" "$APK_NAME" \
            --title "My Girls — Build ${{ github.run_number }}" \
            --notes "Build ${{ github.run_number }} — icon fix via ImageMagick" \
            --latest \
            --repo ${{ github.repository }}
          echo "✅ https://github.com/${{ github.repository }}/releases/download/$TAG/$APK_NAME"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/gradle.log
          retention-days: 7
